<!DOCTYPE html>
<html>
<head>
    <title>SessionId 测试</title>
</head>
<body>
    <h1>LocalStorage 测试</h1>
    <div>当前 sessionId: <span id="sessionId"></span></div>
    <div id="stored"></div>
    
    <script>
        const stored = localStorage.getItem('ichat_session_id');
        document.getElementById('stored').textContent = '存储的值: ' + (stored || '(空)');
        
        if (stored) {
            document.getElementById('sessionId').textContent = stored;
        } else {
            const newId = 'session-' + Date.now();
            localStorage.setItem('ichat_session_id', newId);
            document.getElementById('sessionId').textContent = newId + ' (新生成)';
        }
    </script>
</body>
</html>
